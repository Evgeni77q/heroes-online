<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fa89a"/>
      <stop offset="35%" stop-color="#b8c4a8"/>
      <stop offset="100%" stop-color="#7f6b4f"/>
    </linearGradient>
    <radialGradient id="hill-left" cx="20%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#8d7a5d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8d7a5d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hill-right" cx="82%" cy="62%" r="40%">
      <stop offset="0%" stop-color="#6f5d45" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6f5d45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="castle-pad" cx="50%" cy="48%" r="28%">
      <stop offset="0%" stop-color="#9a8b72" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9a8b72" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#sky)"/>
  <rect width="1200" height="900" fill="url(#hill-left)"/>
  <rect width="1200" height="900" fill="url(#hill-right)"/>
  <rect width="1200" height="900" fill="url(#castle-pad)"/>
  <ellipse cx="220" cy="760" rx="180" ry="55" fill="#5f7f6a" opacity="0.25"/>
  <ellipse cx="980" cy="720" rx="220" ry="60" fill="#4f6d7d" opacity="0.22"/>
  <rect width="1200" height="900" filter="url(#grain)" opacity="0.5"/>
</svg>
