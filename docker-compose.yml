services:
  postgres:
    image: postgres:16-alpine
    container_name: heroes-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heroes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heroes_dev}
      POSTGRES_DB: ${POSTGRES_DB:-heroes_online}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heroes} -d ${POSTGRES_DB:-heroes_online}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: heroes-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-heroes_dev}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-heroes_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

